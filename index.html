const Btn=({children,onClick,variant="primary",size="md",disabled=false,full=false,style:e={}})=>{
  const v={primary:{background:OR,color:"#fff",border:"none"},secondary:{background:"#fff",color:BLACK,border:`1px solid ${OR}`},danger:{background:"#dc2626",color:"#fff",border:"none"},ghost:{background:"#fff7ef",color:BLACK,border:"1px solid #f0d7c1"},success:{background:"#15803d",color:"#fff",border:"none"},dark:{background:BLACK,color:"#fff",border:"none"}};
  const sz={sm:{padding:"4px 10px",fontSize:11},md:{padding:"7px 15px",fontSize:12.5},lg:{padding:"11px 22px",fontSize:14}};
  return <button onClick={disabled?undefined:onClick} disabled={disabled} style={{borderRadius:9,fontFamily:"inherit",cursor:disabled?"not-allowed":"pointer",display:"inline-flex",alignItems:"center",gap:5,fontWeight:800,transition:"all .13s",opacity:disabled?0.6:1,width:full?"100%":"auto",justifyContent:full?"center":"flex-start",boxShadow:variant==="primary"?"0 8px 18px rgba(234,108,10,.18)":"none",...v[variant],...sz[size],...e}}>{children}</button>;
};

// LOGIN
// ─────────────────────────────────────────────
function LoginPage({onLogin,onPublicView,onRegister}){
  const [mode,setMode]=useState("choice");

  // LOGIN
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");

  // REGISTER
  const [reg,setReg]=useState({
    name:"",
    district:"",
    designation:"",
    email:"",
    school:"",
    cluster:"",
    password:""
  });

  const doLogin=async()=>{
    if(!email||!pass){
      setErr("Please enter email and password");
      return;
    }

    setLoading(true);

    await new Promise(r=>setTimeout(r,500));

    const allUsers=[
      ...USERS_INIT,
      ...(JSON.parse(localStorage.getItem("ett_users")||"[]"))
    ];

    const u=allUsers.find(
      x=>x.email===email && x.password===pass
    );

    setLoading(false);

    if(!u){
      setErr("Invalid email or password");
      return;
    }

    onLogin(u);
  };

  const createAccount=()=>{
    if(
      !reg.name ||
      !reg.district ||
      !reg.designation ||
      !reg.email ||
      !reg.password
    ){
      setErr("Please fill all mandatory fields");
      return;
    }

    const users=JSON.parse(localStorage.getItem("ett_users")||"[]");

    const exists=users.find(
      u=>u.email===reg.email
    );

    if(exists){
      setErr("Account already exists");
      return;
    }

    const newUser={
      id:Date.now().toString(),
      name:reg.name,
      district:reg.district,
      designation:reg.designation,
      email:reg.email,
      school:reg.school,
      cluster:reg.cluster,
      password:reg.password,
      role:"viewer",
      avatar:reg.name
        .split(" ")
        .map(x=>x[0])
        .join("")
        .toUpperCase()
    };

    users.push(newUser);

    localStorage.setItem(
      "ett_users",
      JSON.stringify(users)
    );

    onRegister(newUser);
  };

  return(
    <div style={{
      minHeight:"100vh",
      display:"flex",
      alignItems:"center",
      justifyContent:"center",
      background:"linear-gradient(180deg,#fff 0%,#fff7ef 100%)",
      padding:16
    }}>
      <div style={{
        width:"100%",
        maxWidth:450,
        background:"#fff",
        borderRadius:16,
        padding:28,
        boxShadow:"0 18px 48px rgba(234,108,10,.16)"
      }}>

        <div style={{textAlign:"center",marginBottom:24}}>
          <AfricaLogo size={60} variant="black"/>
          <h1 style={{margin:"12px 0 5px"}}>
            ETT Malawi
          </h1>
          <p style={{color:"#6b7280"}}>
            Ujamaa Pamodzi Africa
          </p>
        </div>

        {/* CHOICE SCREEN */}
        {mode==="choice" && (
          <>
            <Btn
              full
              onClick={()=>setMode("login")}
              style={{marginBottom:12}}
            >
              🔐 Login
            </Btn>

            <Btn
              full
              variant="secondary"
              onClick={()=>setMode("register")}
              style={{marginBottom:12}}
            >
              👤 Create Account
            </Btn>

            <Btn
              full
              variant="ghost"
              onClick={onPublicView}
            >
              🌍 View Public Dashboard
            </Btn>
          </>
        )}

        {/* LOGIN */}
        {mode==="login" && (
          <>
            <h2 style={{marginBottom:18}}>
              Sign In
            </h2>

            <FInput
              label="Email"
              type="email"
              value={email}
              onChange={e=>setEmail(e.target.value)}
            />

            <FInput
              label="Password"
              type="password"
              value={pass}
              onChange={e=>setPass(e.target.value)}
            />

            {err && (
              <div style={{
                background:"#fee2e2",
                color:"#991b1b",
                padding:10,
                borderRadius:8,
                marginBottom:12,
                fontSize:12
              }}>
                {err}
              </div>
            )}

            <Btn
              full
              onClick={doLogin}
              disabled={loading}
            >
              {loading ? "Signing In..." : "Sign In"}
            </Btn>

            <div style={{marginTop:12}}>
              <Btn
                variant="ghost"
                onClick={()=>setMode("choice")}
              >
                ← Back
              </Btn>
            </div>
          </>
        )}

        {/* REGISTER */}
        {mode==="register" && (
          <>
            <h2 style={{marginBottom:18}}>
              Create Account
            </h2>

            <FInput
              label="Full Name *"
              value={reg.name}
              onChange={e=>setReg({...reg,name:e.target.value})}
            />

            <FSelect
              label="District *"
              value={reg.district}
              onChange={e=>setReg({...reg,district:e.target.value})}
            >
              <option value="">Select district</option>

              {DISTRICT_LIST.map(d=>(
                <option key={d}>{d}</option>
              ))}
            </FSelect>

            <FInput
              label="Designation *"
              value={reg.designation}
              onChange={e=>setReg({...reg,designation:e.target.value})}
            />

            <FInput
              label="Email *"
              type="email"
              value={reg.email}
              onChange={e=>setReg({...reg,email:e.target.value})}
            />

            <FInput
              label="School Name"
              value={reg.school}
              onChange={e=>setReg({...reg,school:e.target.value})}
            />

            <FInput
              label="Cluster Name"
              value={reg.cluster}
              onChange={e=>setReg({...reg,cluster:e.target.value})}
            />

            <FInput
              label="Password *"
              type="password"
              value={reg.password}
              onChange={e=>setReg({...reg,password:e.target.value})}
            />

            {err && (
              <div style={{
                background:"#fee2e2",
                color:"#991b1b",
                padding:10,
                borderRadius:8,
                marginBottom:12,
                fontSize:12
              }}>
                {err}
              </div>
            )}

            <Btn
              full
              onClick={createAccount}
            >
              Create Account
            </Btn>

            <div style={{marginTop:12}}>
              <Btn
                variant="ghost"
                onClick={()=>setMode("choice")}
              >
                ← Back
              </Btn>
            </div>
          </>
        )}

      </div>
    </div>
  );
}

function SubmitReport({user,onSubmit,showToast}){
  const isPublic=!user;
  const assignedCluster=user?.role==="tot"?CLUSTERS.find(c=>c.id===user.clusterId):null;
  const E=isPublic
    ?{school:"",district:"",zone:"",boys:"",girls:"",curriculum:"Harassment or intimidation",session:"",challenges:"",success:""}
    :{school:"",district:user?.district||"",zone:assignedCluster?.name||"",boys:"",girls:"",curriculum:"HIM",session:"",challenges:"",success:""};
  const [f,setF]=useState(E);
  const [done,setDone]=useState(false);
  const s=k=>e=>setF(p=>({...p,[k]:e.target.value}));

  const submit=()=>{
    if(isPublic){
      if(!f.school||!f.district||!f.session){showToast("Please fill in the required case details");return;}
      onSubmit({...f,boys:parseInt(f.boys)||0,girls:parseInt(f.girls)||0,zone:f.zone||"Not specified",status:"pending",submitted_by:"Public case report",submitted_at:new Date().toISOString().split("T")[0]});
      setDone(true);showToast("Case report sent for safe review");
      return;
    }
    if(!f.school||!f.district||!f.zone||!f.session){showToast("⚠️ Please fill in all required fields");return;}
    onSubmit({...f,boys:parseInt(f.boys)||0,girls:parseInt(f.girls)||0,status:"pending",submitted_by:user.name,submitted_at:new Date().toISOString().split("T")[0]});
    setDone(true);showToast("✅ Report submitted — awaiting review");
  };

  if(done)return(
    <Card style={{maxWidth:440,margin:"0 auto",textAlign:"center",padding:36}}>
      <div style={{fontSize:52,marginBottom:10}}>✅</div>
      <h2 style={{margin:"0 0 8px",fontSize:18,fontWeight:700}}>{isPublic?"Case Report Sent":"Report Submitted!"}</h2>
      <p style={{color:"#6b7280",fontSize:13,marginBottom:18}}>{isPublic?"Thank you. A trained reviewer can use this information to guide support and referral. If someone is in immediate danger, call Child Helpline 116 or VSU Police 997 now.":"Pending review by your District Coordinator or National Admin."}</p>
      <div style={{display:"flex",gap:8,justifyContent:"center"}}>
        <Btn onClick={()=>{setF(E);setDone(false);}}>{isPublic?"Report Another Case":"Submit Another"}</Btn>
        <Btn variant="secondary" onClick={()=>setDone(false)}>Back</Btn>
      </div>
    </Card>
  );

  if(isPublic)return(
    <div style={{maxWidth:760}}>
      <Kicker text="Safe Reporting"/>
      <h1 style={{margin:"0 0 4px",fontSize:23,fontWeight:800,color:BLACK}}>Report a Case</h1>
      <p style={{margin:"0 0 14px",color:"#4b5563",fontSize:13,lineHeight:1.6}}>Use this page to report suspected or confirmed SGBV concerns safely. Do not include graphic details. Share only what is needed to help the right people respond.</p>

      <Card style={{background:BLACK,color:"#fff",border:"none",marginBottom:14}}>
        <div style={{fontSize:12.5,lineHeight:1.7}}>
          <b>You can report:</b> sexual harassment, assault, defilement, exploitation, coercion, threats, bullying linked to gender, unsafe school routes, online abuse, forced relationships, child marriage concerns, or urgent protection and referral needs.
        </div>
        <div style={{fontSize:11.5,color:"rgba(255,255,255,.68)",marginTop:8}}>Emergency contacts: Child Helpline 116 · VSU Police 997</div>
      </Card>

      <Card>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
          <FInput label="Where did it happen? *" placeholder="School, community, route, or online platform" value={f.school} onChange={s("school")}/>
          <FSelect label="District *" value={f.district} onChange={s("district")}>
            <option value="">Select district...</option>
            {DISTRICT_LIST.map(d=><option key={d}>{d}</option>)}
          </FSelect>
        </div>
        <FSelect label="What are you reporting? *" value={f.curriculum} onChange={s("curriculum")}>
          {["Harassment or intimidation","Sexual assault or attempted assault","Defilement or abuse of a child","Exploitation, coercion, or transactional sex","Threats, stalking, or retaliation","Online abuse or image-based abuse","Unsafe school route or unsafe learning space","Forced relationship or child marriage concern","Need referral, counselling, or protection support","Other SGBV concern"].map(x=><option key={x}>{x}</option>)}
        </FSelect>
        <FSelect label="Who is affected?" value={f.zone} onChange={s("zone")}>
          <option value="">Prefer not to say</option>
          <option>Girl learner</option>
          <option>Boy learner</option>
          <option>Young woman</option>
          <option>Young man</option>
          <option>Adult woman</option>
          <option>Adult man</option>
          <option>Group of learners</option>
          <option>Other / unknown</option>
        </FSelect>
        <FArea label="What happened? *" placeholder="Briefly describe what happened, when it happened, and whether the person is currently safe." value={f.session} onChange={s("session")}/>
        <FArea label="Immediate support needed" placeholder="Medical help, police/VSU support, counselling, safe transport, school protection, referral pathway, or other support." value={f.challenges} onChange={s("challenges")}/>
        <FArea label="Contact or follow-up note" placeholder="Optional. Add a safe contact method or explain if you prefer not to be contacted." value={f.success} onChange={s("success")}/>
        <div style={{display:"flex",gap:8,marginTop:4,flexWrap:"wrap"}}>
          <Btn onClick={submit}>Send Case Report</Btn>
          <Btn variant="secondary" onClick={()=>setF(E)}>Reset</Btn>
        </div>
      </Card>
    </div>
  );

  return(
    <div style={{maxWidth:640}}>
      <Kicker text="Field Reporting"/>
      <h1 style={{margin:"0 0 4px",fontSize:21,fontWeight:700}}>Submit Session Report</h1>
      <p style={{margin:"0 0 14px",color:"#6b7280",fontSize:13}}>{assignedCluster?`Record attendance and session delivery for ${assignedCluster.name}.`:"Record attendance, session details, challenges and successes after each school visit."}</p>

      {/* TOT stats bar */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        {[["12","Schools Reported"],["4","Clusters Active"],["21","Reports Submitted"]].map(([v,l])=>(
          <div key={l} style={{background:OR_PALE,borderRadius:8,padding:"9px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:700,color:OR}}>{v}</div>
            <div style={{fontSize:10,color:OR_D}}>{l}</div>
          </div>
        ))}
      </div>

      <Card>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
          <FInput label="School Name *" placeholder="e.g. Kawale Primary" value={f.school} onChange={s("school")}/>
          <FSelect label="District *" value={f.district} onChange={s("district")}>
            <option value="">Select district…</option>
            {DISTRICT_LIST.map(d=><option key={d}>{d}</option>)}
          </FSelect>
        </div>
        <FInput label={assignedCluster?"Assigned Cluster *":"Education Zone *"} placeholder={assignedCluster?"Assigned cluster":"e.g. Kawale Zone"} value={f.zone} onChange={s("zone")} readOnly={!!assignedCluster}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
          <FInput label="Number of Boys" type="number" placeholder="0" min="0" value={f.boys} onChange={s("boys")}/>
          <FInput label="Number of Girls" type="number" placeholder="0" min="0" value={f.girls} onChange={s("girls")}/>
        </div>
        <FSelect label="Curriculum *" value={f.curriculum} onChange={s("curriculum")}>
          <option value="HIM">HIM — Hero in Me (Boys)</option>
          <option value="GESD">GESD — Girls Empowerment</option>
          <option value="Combined">Combined Session</option>
        </FSelect>
        <FSelect label="Session Conducted *" value={f.session} onChange={s("session")}>
          <option value="">Select session…</option>
          {(SESSION_LISTS[f.curriculum]||[]).map(x=><option key={x}>{x}</option>)}
        </FSelect>
        <FArea label="Challenges Faced" placeholder="Any challenges, low attendance, resource gaps…" value={f.challenges} onChange={s("challenges")}/>
        <FArea label="Success Stories" placeholder="Positive outcomes, memorable moments, student engagement…" value={f.success} onChange={s("success")}/>
        <div style={{display:"flex",gap:8,marginTop:4}}>
          <Btn onClick={submit}>📤 Submit Report</Btn>
          <Btn variant="secondary" onClick={()=>setF(E)}>Reset</Btn>
        </div>
      </Card>

      {/* Pending reports review (for coordinators/admin) */}
    </div>
  );
}

// REPORTS PAGE  (with coordinator approve/reject)
// ─────────────────────────────────────────────
function ReportsPage({user,reports,onUpdateStatus,showToast}){
  const [filt,setFilt]=useState("all");
  const [search,setSearch]=useState("");
  const [sel,setSel]=useState(null);

  const visible=reports.filter(r=>{
    if(user.role==="district_coordinator"&&r.district!==user.district)return false;
    if((user.role==="data_entry"||user.role==="tot")&&r.submitted_by!==user.name)return false;
    if(filt!=="all"&&r.status!==filt)return false;
    const q=search.toLowerCase();
    if(q&&!r.school.toLowerCase().includes(q)&&!r.district.toLowerCase().includes(q))return false;
    return true;
  });

  return(
    <div>
      <Kicker text="Reporting"/>
      <h1 style={{margin:"0 0 13px",fontSize:21,fontWeight:700}}>{user.role==="data_entry"?"My Reports":"All Session Reports"}</h1>
      <Card>
        <FilterBar
          options={["all","pending","approved","rejected"].map(x=>({v:x,l:`${x.charAt(0).toUpperCase()+x.slice(1)} (${reports.filter(r=>x==="all"?true:r.status===x).length})`}))}
          active={filt} onChange={setFilt}
          search={search} onSearch={setSearch} searchPlaceholder="Search school or district…"
        />
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <TH cols={["School","District","Curriculum","Session","Students","Status","Date","Actions"]}/>
            <tbody>
              {visible.map(r=>(
                <tr key={r.id} style={{borderBottom:"1px solid #f3f4f6"}}>
                  <td style={{padding:"7px 9px",fontWeight:600}}>{r.school}</td>
                  <td style={{padding:"7px 9px",color:"#6b7280"}}>{r.district}</td>
                  <td style={{padding:"7px 9px"}}><Badge text={r.curriculum}/></td>
                  <td style={{padding:"7px 9px",color:"#6b7280",fontSize:11,maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.session}</td>
                  <td style={{padding:"7px 9px"}}>{r.boys+r.girls}</td>
                  <td style={{padding:"7px 9px"}}><Pill s={r.status}/></td>
                  <td style={{padding:"7px 9px",color:"#9ca3af",fontSize:11}}>{r.submitted_at}</td>
                  <td style={{padding:"7px 9px"}}>
                    <div style={{display:"flex",gap:4}}>
                      <Btn size="sm" variant="ghost" onClick={()=>setSel(r)}>View</Btn>
                      {can(user.role,"approveReport")&&r.status==="pending"&&<>
                        <Btn size="sm" variant="success" onClick={()=>{onUpdateStatus(r.id,"approved");showToast("✅ Approved");}}>✓</Btn>
                        <Btn size="sm" variant="danger" onClick={()=>{onUpdateStatus(r.id,"rejected");showToast("Report rejected");}}>✗</Btn>
                      </>}
                    </div>
                  </td>
                </tr>
              ))}
              {visible.length===0&&<tr><td colSpan={8} style={{padding:20,textAlign:"center",color:"#9ca3af"}}>No reports found</td></tr>}
            </tbody>
          </table>
        </div>
      </Card>
      {sel&&(
        <Modal title={`Report: ${sel.school}`} onClose={()=>setSel(null)}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:13}}>
            {[["School",sel.school],["District",sel.district],["Zone",sel.zone],["Curriculum",sel.curriculum],["Boys",sel.boys],["Girls",sel.girls],["Total",sel.boys+sel.girls],["By",sel.submitted_by],["Date",sel.submitted_at]].map(([l,v])=>(
              <div key={l}><div style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase"}}>{l}</div><div style={{fontSize:13,fontWeight:600,marginTop:2}}>{v}</div></div>
            ))}
          </div>
          <div style={{marginBottom:9}}><div style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",marginBottom:3}}>Session</div><div style={{fontSize:12.5}}>{sel.session}</div></div>
          {sel.challenges&&<div style={{marginBottom:9}}><div style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",marginBottom:3}}>Challenges</div><div style={{fontSize:12.5,background:"#fef9c3",padding:"7px 10px",borderRadius:6}}>{sel.challenges}</div></div>}
          {sel.success&&<div style={{marginBottom:13}}><div style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",marginBottom:3}}>Success Stories</div><div style={{fontSize:12.5,background:"#d1fae5",padding:"7px 10px",borderRadius:6}}>{sel.success}</div></div>}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <Pill s={sel.status}/>
            {can(user.role,"approveReport")&&sel.status==="pending"&&(
              <div style={{display:"flex",gap:7}}>
                <Btn variant="success" onClick={()=>{onUpdateStatus(sel.id,"approved");setSel(null);showToast("✅ Approved");}}>✅ Approve</Btn>
                <Btn variant="danger" onClick={()=>{onUpdateStatus(sel.id,"rejected");setSel(null);showToast("Rejected");}}>Reject</Btn>
              </div>
            )}
          </div>
        </Modal>
      )}
    </div>
  );
}

function MapsPage({ setPage, user, focus }) {

  const [selectedRegion, setSelectedRegion] =
    React.useState("All");

  const [selectedCluster, setSelectedCluster] =
    React.useState(null);

  const [showLegend, setShowLegend] =
    React.useState(true);

  const mapRef = React.useRef(null);

  const regions = [
    "All",
    "Northern",
    "Central",
    "Southern"
  ];

  const clustersWithCoords = CLUSTERS.map(c => {

    const district =
      DISTRICTS.find(
        d => d.name === c.district
      );

    return {
      ...c,
      region: district?.r || "Central",
      lat:
        DISTRICT_INFO[c.district]?.lat || -13.5,
      lng:
        DISTRICT_INFO[c.district]?.lng || 34
    };

  });

  const filteredClusters =
    selectedRegion === "All"
      ? clustersWithCoords
      : clustersWithCoords.filter(
          c => c.region === selectedRegion
        );

  const flyToCluster = cluster => {

    if (!mapRef.current) return;

    mapRef.current.flyTo(
      [cluster.lat, cluster.lng],
      9,
      {
        duration: 2
      }
    );

  };

  React.useEffect(() => {

    if (!window.L) return;

    const map = L.map("ett-map", {
      zoomControl: true
    }).setView([-13.5, 34], 6);

    mapRef.current = map;

    // CARTODB TILE LAYER
    L.tileLayer(
      "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
      {
        attribution:
          '&copy; OpenStreetMap contributors &copy; CARTO'
      }
    ).addTo(map);

    // SCALE BAR
    L.control
      .scale({
        imperial: false
      })
      .addTo(map);

    // CLUSTER MARKERS
    filteredClusters.forEach(cluster => {

      const color =
        cluster.progress >= 80
          ? "#16a34a"
          : cluster.progress >= 60
          ? "#ea580c"
          : "#dc2626";

      const marker = L.circleMarker(
        [cluster.lat, cluster.lng],
        {
          radius: 11,
          fillColor: color,
          color: "#fff",
          weight: 2,
          fillOpacity: 0.9
        }
      ).addTo(map);

      marker.bindPopup(`
        <div style="min-width:220px;font-family:Arial">
          <h3 style="margin:0 0 6px;font-size:15px;">
            ${cluster.name}
          </h3>

          <div style="font-size:12px;color:#555;margin-bottom:8px;">
            ${cluster.district} District
          </div>

          <div style="margin-bottom:6px;">
            <b>Schools:</b> ${cluster.schools}
          </div>

          <div style="margin-bottom:6px;">
            <b>Students:</b> ${cluster.students}
          </div>

          <div style="margin-bottom:10px;">
            <b>Progress:</b> ${cluster.progress}%
          </div>

          <button
            onclick="window.openClusterModal(${cluster.id})"
            style="
              width:100%;
              border:none;
              background:#ea6c0a;
              color:white;
              padding:8px;
              border-radius:8px;
              cursor:pointer;
              font-weight:bold;
            "
          >
            View Details
          </button>
        </div>
      `);

      marker.on("click", () => {
        flyToCluster(cluster);
      });

    });

    // DISTRICT POINTS
    DISTRICTS.forEach(district => {

      const coords =
        DISTRICT_INFO[district.name];

      if (!coords) return;

      L.circleMarker(
        [coords.lat, coords.lng],
        {
          radius: 5,
          fillColor: "#111827",
          color: "#fff",
          weight: 1,
          fillOpacity: 0.9
        }
      )
        .addTo(map)
        .bindTooltip(district.name);

    });

    // SCHOOL MARKERS + LINES
    CLUSTER_SCHOOLS.forEach(clusterGroup => {

      const cluster =
        clustersWithCoords.find(
          c => c.id === clusterGroup.clusterId
        );

      if (!cluster) return;

      const schoolPoints = [];

      clusterGroup.schools.forEach(school => {

        schoolPoints.push([
          school.lat,
          school.lng
        ]);

        // SCHOOL MARKER
        L.circleMarker(
          [school.lat, school.lng],
          {
            radius: 7,
            fillColor: "#2563eb",
            color: "#fff",
            weight: 2,
            fillOpacity: 1
          }
        )
          .addTo(map)
          .bindPopup(`
            <div style="font-family:Arial">
              <b>${school.name}</b><br/>
              Cluster: ${cluster.name}
            </div>
          `);

        // LINE TO CLUSTER
        L.polyline(
          [
            [cluster.lat, cluster.lng],
            [school.lat, school.lng]
          ],
          {
            color: "#94a3b8",
            weight: 2,
            opacity: 0.7,
            dashArray: "5,5"
          }
        ).addTo(map);

      });

      // CONNECT SCHOOLS
      if (schoolPoints.length > 1) {

        L.polyline(
          schoolPoints,
          {
            color: "#2563eb",
            weight: 3,
            opacity: 0.5
          }
        ).addTo(map);

      }

    });

    return () => {
      map.remove();
    };

  }, [selectedRegion]);

  window.openClusterModal = id => {

    const cluster =
      clustersWithCoords.find(
        c => c.id === id
      );

    setSelectedCluster(cluster);

  };

  return (
    <div>

      <div
        style={{
          display: "grid",
          gridTemplateColumns: "320px 1fr",
          gap: 14
        }}
        data-map-grid
      >

        {/* SIDEBAR */}
        <div
          style={{

            padding: 16,
            maxHeight: "82vh",
            overflowY: "auto",
            boxShadow:
              "0 10px 24px rgba(0,0,0,.06)"
          }}
        >

          <h2
            style={{
              marginTop: 0
            }}
          >
            Malawi Clusters
          </h2>

          {/* REGION FILTER */}
          <div
            style={{
              display: "flex",
              gap: 6,
              flexWrap: "wrap",
              marginBottom: 18
            }}
          >
            {regions.map(region => (

              <button
                key={region}
                onClick={() =>
                  setSelectedRegion(region)
                }
                style={{
                  border: "none",
                  background:
                    selectedRegion === region
                      ? "#ea6c0a"
                      : "#f3f4f6",
                  color:
                    selectedRegion === region
                      ? "#fff"
                      : "#111",
                  padding: "8px 12px",
                  borderRadius: 20,
                  cursor: "pointer",

                }}

              </button>

            ))}
          </div>

          {/* CLUSTERS */}
          <div

            }}
          >

            {filteredClusters.map(cluster => (

              <div

                }}
                style={{

                }}
              >

                <div

                  }}

                  {cluster.name}
                </div>

                  }}

          </div>

        </div>

        {/* MAP */}
        <div

          <div

          {/* LEGEND */}

              }

function AnalyticsPage({reports}){
  const byStatus={approved:0,pending:0,rejected:0};
  const byCurr={HIM:0,GESD:0,Combined:0};
  const byDist={};
  let boys=0,girls=0;
  reports.forEach(r=>{byStatus[r.status]=(byStatus[r.status]||0)+1;byCurr[r.curriculum]=(byCurr[r.curriculum]||0)+1;byDist[r.district]=(byDist[r.district]||0)+1;boys+=r.boys;girls+=r.girls;});
  const Bar=({label,value,max,color=OR})=>(
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{fontWeight:600}}>{label}</span><span style={{color:OR,fontWeight:700}}>{value}</span></div>
      <ProgBar pct={max?Math.round(value/max*100):0} color={color}/>
    </div>
  );
  return(
    <div>
      <Kicker text="Analytics"/>
      <h1 style={{margin:"0 0 13px",fontSize:21,fontWeight:700}}>Program Analytics</h1>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(135px,1fr))",gap:9,marginBottom:16}}>
        <StatCard icon="📋" label="Total Reports" value={reports.length}/><StatCard icon="👦" label="Boys Reached" value={boys} color="#1e40af"/><StatCard icon="👧" label="Girls Reached" value={girls} color="#a82563"/><StatCard icon="👨‍🎓" label="Total Students" value={boys+girls}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>
        <Card><SH title="Report Status"/>{Object.entries(byStatus).map(([k,v])=><Bar key={k} label={k.charAt(0).toUpperCase()+k.slice(1)} value={v} max={reports.length} color={k==="approved"?"#15803d":k==="rejected"?"#dc2626":OR}/>)}</Card>
        <Card><SH title="By Curriculum"/>{Object.entries(byCurr).map(([k,v])=><Bar key={k} label={k} value={v} max={reports.length}/>)}</Card>
        <Card><SH title="By District"/>{Object.entries(byDist).map(([k,v])=><Bar key={k} label={k} value={v} max={Math.max(...Object.values(byDist))}/>)}</Card>
      </div>
      <Card>
        <SH title="Regional Summary"/>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <TH cols={["Region","Districts","TOTs","Schools","Clusters","Coverage"]}/>
          <tbody>
            {[["Northern","6/6","249","83","28","70%"],["Central","6/9","384","128","44","61%"],["Southern","10/13","501","167","55","73%"]].map(([r,...v])=>(
              <tr key={r} style={{borderBottom:"1px solid #f3f4f6"}}><td style={{padding:"7px 9px",fontWeight:700}}>{r}</td>{v.map((x,i)=><td key={i} style={{padding:"7px 9px",color:"#374151"}}>{x}</td>)}</tr>
            ))}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

function UsersPage({user:cu,showToast}){
  const [users,setUsers]=useState(USERS_INIT.map(u=>({...u})));
  const [showAdd,setShowAdd]=useState(false);
  const [filt,setFilt]=useState("all");
  const [search,setSearch]=useState("");
  const [nf,setNf]=useState({first:"",last:"",email:"",role:"data_entry",district:""});
  const sn=k=>e=>setNf(p=>({...p,[k]:e.target.value}));
  if(!can(cu.role,"manageUsers")) return <div style={{padding:48,textAlign:"center",color:"#9ca3af"}}>🔒 Access denied. National Admin only.</div>;
  const visible=users.filter(u=>{if(filt!=="all"&&u.role!==filt)return false;const q=search.toLowerCase();if(q&&!u.name.toLowerCase().includes(q)&&!u.email.toLowerCase().includes(q))return false;return true;});
  const addUser=()=>{
    if(!nf.first||!nf.last||!nf.email){showToast("⚠️ Fill in name and email");return;}
    setUsers(p=>[{id:Date.now().toString(),email:nf.email,password:"temp123",role:nf.role,name:`${nf.first} ${nf.last}`,district:nf.district||null,avatar:(nf.first[0]+nf.last[0]).toUpperCase(),status:"pending"},...p]);
    setShowAdd(false);setNf({first:"",last:"",email:"",role:"data_entry",district:""});
    showToast(`✅ ${nf.first} ${nf.last} added — pending activation`);
  };
  const cols=["#ea6c0a","#2563a8","#15803d","#7c3aed","#dc2626","#0891b2"];
  return(
    <div>
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:16}}>
        <div><Kicker text="Admin"/><h1 style={{margin:0,fontSize:21,fontWeight:700}}>User Management</h1></div>

      </div>
      <Card>
        <FilterBar
          options={["all","admin","tot","data_entry","district_coordinator","viewer"].map(x=>({v:x,l:x==="all"?"All":(ROLE_CFG[x]?.label||x)+" ("+( x==="all"?users:users.filter(u=>u.role===x)).length+")"}))}
          active={filt} onChange={setFilt} search={search} onSearch={setSearch} searchPlaceholder="Search users…"
        />
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <TH cols={["User","Role","District","Status","Actions"]}/>
            <tbody>
              {visible.map((u,i)=>{
                const rc=ROLE_CFG[u.role];
                return(
                  <tr key={u.id} style={{borderBottom:"1px solid #f3f4f6"}}>
                    <td style={{padding:"8px 9px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:28,height:28,borderRadius:"50%",background:cols[i%cols.length],color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0}}>{u.avatar}</div>
                        <div><div style={{fontWeight:700,fontSize:12}}>{u.name}</div><div style={{fontSize:10.5,color:"#9ca3af"}}>{u.email}</div></div>
                      </div>
                    </td>
                    <td style={{padding:"8px 9px"}}><Badge text={rc?.label||u.role} color={rc?.color||"#6b7280"} bg={rc?.bg||"#f3f4f6"}/></td>
                    <td style={{padding:"8px 9px",fontSize:12,color:"#6b7280"}}>{u.district||"—"}</td>
                    <td style={{padding:"8px 9px"}}>
                      <span style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:12}}>
                        <span style={{width:7,height:7,borderRadius:"50%",background:u.status==="active"?"#22c55e":u.status==="pending"?"#f59e0b":"#d1d5db",display:"inline-block"}}/>
                        {u.status.charAt(0).toUpperCase()+u.status.slice(1)}
                      </span>
                    </td>
                    <td style={{padding:"8px 9px"}}>
                      <div style={{display:"flex",gap:4}}>
                        {u.status==="pending"&&<Btn size="sm" variant="success" onClick={()=>{setUsers(p=>p.map(x=>x.id===u.id?{...x,status:"active"}:x));showToast("User activated!");}}>Activate</Btn>}
                        {u.status==="active"&&u.id!==cu.id&&<Btn size="sm" variant="danger" onClick={()=>{setUsers(p=>p.map(x=>x.id===u.id?{...x,status:"inactive"}:x));showToast("User deactivated.");}}>Deactivate</Btn>}

                      </div>
                    </td>
                  </tr>
                );
              })}
              {visible.length===0&&<tr><td colSpan={5} style={{padding:20,textAlign:"center",color:"#9ca3af"}}>No users found</td></tr>}
            </tbody>
          </table>
        </div>
      </Card>
      {showAdd&&(
        <Modal title="Add New User" onClose={()=>setShowAdd(false)}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
            <FInput label="First Name *" placeholder="Grace" value={nf.first} onChange={sn("first")}/>

            <option value="">None (National)</option>
            {DISTRICT_LIST.map(d=><option key={d}>{d}</option>)}
          </FSelect>
          <div style={{display:"flex",gap:8}}>
            <Btn onClick={addUser}>Add User</Btn>
            <Btn variant="secondary" onClick={()=>setShowAdd(false)}>Cancel</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

              overflow: "hidden",
              cursor: "pointer",
              transition: "all 0.2s ease"
            }}
            onClick={() => setExpanded(expanded === story.id ? null : story.id)}
          >
            <div style={{padding: "12px 14px"}}>
              <div style={{fontWeight: 700, fontSize: 13, marginBottom: 6, color: "#111"}}>
                {story.title}
              </div>
              <div style={{fontSize: 11.5, color: "#6b7280", lineHeight: 1.5, marginBottom: 6}}>
                {story.summary}
              </div>
              <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 9, color: "#9ca3af"}}>
                <span>📅 {story.date}</span>
                <span style={{color: "#ea6c0a", fontWeight: 600}}>
                  {expanded === story.id ? "▲ Read less" : "▼ Read more"}
                </span>
              </div>
              
              {expanded === story.id && (
                <div style={{
                  marginTop: 12,
                  paddingTop: 10,
                  borderTop: "1px solid #f0d7c1",
                  fontSize: 11.5,
                  color: "#374151",
                  lineHeight: 1.6
                }}>
                  <span style={{fontWeight: 700, color: "#ea6c0a"}}>✨ Story:</span> {story.full}
                  <div style={{marginTop: 8, fontStyle: "italic", fontSize: 10, color: "#9ca3af"}}>
                    — {story.author}
                  </div>
                </div>
              )}
            </div>
          </div>
        ))}
      </div>
      
      <div style={{marginTop: 14, textAlign: "center"}}>
        <button 
          onClick={() => window.open("#", "_blank")}
          style={{
            background: "transparent",
            border: "1px solid #ea6c0a",
            borderRadius: 20,
            padding: "6px 14px",
            fontSize: 11,
            fontWeight: 600,
            color: "#ea6c0a",
            cursor: "pointer",
            width: "100%"
          }}
        >
          📢 Share Your Story →
        </button>
      </div>
    </div>
  );
}
// ─────────────────────────────────────────────
// ABOUT PAGE
// ─────────────────────────────────────────────
function AboutPage(){
  return(
    <div>
      <div style={{background:"#fff",border:`1px solid ${OR_PALE}`,borderRadius:12,padding:"28px 26px",color:"#111827",marginBottom:14,boxShadow:"0 8px 24px rgba(234,108,10,.08)"}}>
        <h2 style={{margin:"0 0 5px",fontSize:20,fontWeight:700}}>Fighting SGBV Through Education</h2>
        <p style={{margin:0,color:"#6b7280",fontSize:13,lineHeight:1.6,maxWidth:460}}>Ujamaa Pamodzi Africa works across Malawi to end SGBV through community-led education, teacher empowerment, and collaborative school networks.</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:9}}>
        {[["📍","Our Mission","Eliminate SGBV in Malawi by empowering teachers and students with knowledge and community support."],["🌍","Our Reach","19 active districts, 127 clusters, 7,620+ students across all three regions."],["👩‍🏫","Our Approach","Peer-led ETT training empowering teachers to become agents of change."],["⚖️","Legal Framework","Aligned with Malawi's Gender Equality Act and Child Care, Protection and Justice Act."],["🤝","Partnerships","Ministry of Education, district offices, teacher training colleges and community leaders."],["📞","Contact Us","Lilongwe, Malawi · info@ujamaa.mw\nChild Helpline: 116 · VSU: 997"]].map(([i,t,d])=>(
          <Card key={t}>
            <div style={{fontSize:20,marginBottom:7}}>{i}</div>
            <h4 style={{margin:"0 0 4px",fontSize:12.5,fontWeight:700}}>{t}</h4>
            <p style={{margin:0,fontSize:11.5,color:"#6b7280",lineHeight:1.6,whiteSpace:"pre-line"}}>{d}</p>
          </Card>
        ))}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// ROOT APP
// ─────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState("dashboard");
  const [reports,setReports]=useState(REPORTS_INIT);
  const [toast,setToast]=useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [mapFocus,setMapFocus]=useState(null);

  const showToast=useCallback(msg=>{
    setToast(msg);setTimeout(()=>setToast(null),3800);
  },[]);

  const addReport=r=>setReports(p=>[{id:Date.now(),...r},...p]);
  const updateStatus=(id,status)=>setReports(p=>p.map(r=>r.id===id?{...r,status}:r));
  const openMapTarget=target=>{setMapFocus(target);setPage("maps");};

  const renderPage=()=>{
    const publicPages=["dashboard","submit","maps","trainings","about","login"];
   if(page==="login")
  return (
    <LoginPage
      onLogin={u=>{
        setUser(u);
        setPage("dashboard");
      }}
      onRegister={u=>{
        setUser(u);
        setPage("dashboard");
      }}
      onPublicView={()=>{
        setUser(null);
        setPage("dashboard");
      }}
    />
  );

if(!user&&!publicPages.includes(page))
  return (
    <LoginPage
      onLogin={u=>{
        setUser(u);
        setPage("dashboard");
      }}
      onRegister={u=>{
        setUser(u);
        setPage("dashboard");
      }}
      onPublicView={()=>{
        setUser(null);
        setPage("dashboard");
      }}
    />
  );
   if(page==="login")
  return (
    <LoginPage
      onLogin={u=>{
        setUser(u);
        setPage("dashboard");
      }}
      onRegister={u=>{
        setUser(u);
        setPage("dashboard");
      }}
      onPublicView={()=>{
        setUser(null);
        setPage("dashboard");
      }}
    />
  );

if(!user&&!publicPages.includes(page))
  return (
    <LoginPage
      onLogin={u=>{
        setUser(u);
        setPage("dashboard");
      }}
      onRegister={u=>{
        setUser(u);
        setPage("dashboard");
      }}
      onPublicView={()=>{
        setUser(null);
        setPage("dashboard");
      }}
    />
  );if(
  !user &&
  (
    page === "users" ||
    page === "reports" ||
    page === "analytics" ||
    page === "my_reports"
  )
){
  return (
    <Card style={{maxWidth:500}}>
      <h2>🔒 Restricted Page</h2>

      <p style={{color:"#6b7280"}}>
        This page is only available to authorized ETT staff members.
      </p>

      <Btn onClick={()=>setPage("login")}>
        Staff Login
      </Btn>
    </Card>
  );
}
    switch(page){
      case "dashboard":  return <Dashboard user={user} reports={reports} setPage={setPage}/>;
      case "submit":     return <SubmitReport user={user} onSubmit={addReport} showToast={showToast}/>;
      case "reports":
      case "my_reports": return <ReportsPage user={user} reports={reports} onUpdateStatus={updateStatus} showToast={showToast}/>;
      case "maps": return ( <MapsPage setPage={setPage} user={user} focus={mapFocus} /> );
      case "clusters":   return <ClustersPage user={user} setPage={setPage} onOpenMap={openMapTarget}/>;
      case "districts":  return <DistrictsPage user={user} onOpenMap={openMapTarget}/>;
      case "trainings":  return <TrainingsPage/>;
      case "curriculum": return <CurriculumPage/>;
      case "ett":        return <ETTPage/>;
      case "analytics":  return <AnalyticsPage reports={reports}/>;
      case "users":      return <UsersPage user={user} showToast={showToast}/>;
      case "impact":     return <ImpactPage reports={reports} showToast={showToast}/>;
      case "about":      return <AboutPage/>;
      default:           return <Dashboard user={user} reports={reports} setPage={setPage}/>;
    }
  };

  return(
    <div data-app-shell style={{display:"flex",height:"100vh",fontFamily:"Helvetica,Arial,sans-serif",overflow:"hidden",background:"linear-gradient(180deg,#fffaf5 0%,#fff 45%,#f8f4f1 100%)"}}>
      <GlobalStyles/>
      <Sidebar 
  page={page} 
  setPage={setPage} 
  user={user} 
  onLogout={()=>{setUser(null);setPage("dashboard");}} 
  open={sidebarOpen}
  onClose={() => setSidebarOpen(false)}
/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Topbar */}
        <div data-topbar style={{background:"rgba(255,255,255,.92)",backdropFilter:"blur(12px)",borderBottom:"1px solid #f3e4d7",padding:"0 18px",height:58,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,zIndex:100,boxShadow:"0 8px 22px rgba(59,38,33,.05)"}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
           <button 
  onClick={() => setSidebarOpen(!sidebarOpen)} 
  style={{
    border:"none",
    background:"transparent",
    fontSize:24,
    cursor:"pointer",
    marginRight:12,
    padding: "8px",
    borderRadius: "8px",
    display: "flex",
    alignItems: "center",
    justifyContent: "center"
  }}
>
  ☰
</button>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <AfricaLogo size={28}/>
              <div style={{fontSize:12.5,color:"#9ca3af"}}>{APP_NAME} &nbsp;›&nbsp; <b style={{color:"#111"}}>{page==="submit"&&user?"Submit Report":(PAGE_LABELS[page]||page)}</b></div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {user?<>
              <div style={{background:OR_PALE,color:OR_D,padding:"4px 10px",borderRadius:20,fontSize:11.5,fontWeight:700}}>{ROLE_CFG[user.role].icon} {user.name}</div>
              <div style={{width:30,height:30,borderRadius:"50%",background:OR,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,cursor:"pointer"}} onClick={()=>setPage("users")}>{user.avatar}</div>
            </>:<Btn size="sm" onClick={()=>setPage("login")}>Sign In</Btn>}
          </div>
        </div>
        {/* Content */}
        <div data-content style={{flex:1,overflowY:"auto",padding:18}}>
          {renderPage()}
        </div>
      </div>
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
</html>
